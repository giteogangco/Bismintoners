<!-- SVG Sport Icon Sprite -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!-- dashboard / pulse chart -->
  <symbol id="si-dashboard" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
    <polyline points="2,18 7,11 11,14 16,7 22,10"/>
    <line x1="2" y1="20" x2="22" y2="20"/>
    <line x1="2" y1="20" x2="2" y2="4"/>
  </symbol>
  <!-- queue / lightning bolt -->
  <symbol id="si-queue" viewBox="0 0 24 24" fill="currentColor">
    <polygon points="13,2 4,14 11,14 11,22 20,10 13,10"/>
  </symbol>
  <!-- shuttlecock / diamond target -->
  <symbol id="si-shuttle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
    <circle cx="12" cy="7" r="3"/>
    <line x1="12" y1="10" x2="12" y2="20"/>
    <line x1="8" y1="14" x2="16" y2="14"/>
    <line x1="6" y1="18" x2="18" y2="18"/>
    <line x1="9" y1="20" x2="15" y2="20"/>
  </symbol>
  <!-- chipin / coin stack -->
  <symbol id="si-pay" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
    <ellipse cx="12" cy="7" rx="8" ry="3"/>
    <path d="M4 7v4c0 1.66 3.58 3 8 3s8-1.34 8-3V7"/>
    <path d="M4 11v4c0 1.66 3.58 3 8 3s8-1.34 8-3v-4"/>
  </symbol>
  <!-- expenses / receipt slash -->
  <symbol id="si-costs" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
    <rect x="4" y="2" width="14" height="20" rx="0"/>
    <line x1="8" y1="7" x2="16" y2="7"/>
    <line x1="8" y1="11" x2="14" y2="11"/>
    <line x1="8" y1="15" x2="12" y2="15"/>
  </symbol>
  <!-- stats / podium -->
  <symbol id="si-stats" viewBox="0 0 24 24" fill="currentColor">
    <rect x="2" y="12" width="5" height="10"/>
    <rect x="9" y="7" width="6" height="15"/>
    <rect x="17" y="9" width="5" height="13"/>
  </symbol>
  <!-- members / jersey -->
  <symbol id="si-members" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
    <path d="M3 7l4-3h3c0 1.66 1.34 3 3 3s3-1.34 3-3h3l4 3-3 3v11H6V10L3 7z"/>
  </symbol>
  <!-- projects / trophy -->
  <symbol id="si-projects" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
    <path d="M6 2h12v8a6 6 0 01-12 0V2z"/>
    <path d="M6 6H2V8a4 4 0 004 4"/>
    <path d="M18 6h4V8a4 4 0 01-4 4"/>
    <line x1="12" y1="16" x2="12" y2="20"/>
    <line x1="8" y1="20" x2="16" y2="20"/>
  </symbol>
  <!-- history / stopwatch -->
  <symbol id="si-history" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
    <circle cx="12" cy="13" r="8"/>
    <polyline points="12,9 12,13 15,15"/>
    <line x1="10" y1="2" x2="14" y2="2"/>
    <line x1="12" y1="2" x2="12" y2="5"/>
  </symbol>
  <!-- settings / gear/crosshair -->
  <symbol id="si-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
    <circle cx="12" cy="12" r="3"/>
    <path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M19.07 4.93l-2.12 2.12M7.05 16.95l-2.12 2.12"/>
  </symbol>
  <!-- more / grid dots -->
  <symbol id="si-more" viewBox="0 0 24 24" fill="currentColor">
    <rect x="4" y="4" width="5" height="5" rx="0"/>
    <rect x="15" y="4" width="5" height="5" rx="0"/>
    <rect x="4" y="15" width="5" height="5" rx="0"/>
    <rect x="15" y="15" width="5" height="5" rx="0"/>
  </symbol>
  <!-- crown / superadmin -->
  <symbol id="si-crown" viewBox="0 0 24 24" fill="currentColor">
    <polygon points="2,20 5,8 10,14 12,6 14,14 19,8 22,20"/>
    <rect x="2" y="20" width="20" height="2"/>
  </symbol>
  <!-- shield / admin -->
  <symbol id="si-shield" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
    <path d="M12 2L3 7v6c0 5 3.9 9.7 9 11 5.1-1.3 9-6 9-11V7L12 2z"/>
    <polyline points="9,12 11,14 15,10"/>
  </symbol>
  <!-- member player -->
  <symbol id="si-player" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
    <circle cx="12" cy="7" r="4"/>
    <path d="M2 21c0-5 4-8 10-8s10 3 10 8"/>
  </symbol>
  <!-- eye / guest -->
  <symbol id="si-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
    <circle cx="12" cy="12" r="3"/>
  </symbol>
</svg>
